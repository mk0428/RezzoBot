services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: rezzobot-api
    ports:
      - "8004:8000"
    volumes:
      - rezzobot-data:/data
    env_file:
      - .env
    environment:
      - EXCLUDED_IPS=98.96.223.133
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: rezzobot-bot
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started

  rss-bridge:
    image: rssbridge/rss-bridge:latest
    container_name: rezzobot-rss-bridge
    ports:
      - "8050:80"
    volumes:
      - ./rss-bridge-config.ini.php:/app/config.ini.php:ro
      - rss-bridge-cache:/app/cache
    restart: unless-stopped

volumes:
  rss-bridge-cache:
  rezzobot-data:
